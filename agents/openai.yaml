interface:
  display_name: "More News Briefing"
  version: "0.1.5"
  short_description: "Evidence-first news briefs with optional insight layers"
  default_prompt: "Use $more-news-briefing in full mode. Resolve the briefing contract before retrieval, using the compact first-use gate when needed. Then collect, deduplicate, rank, verify, render, review, and polish a source-backed digest across default or user-defined topics. Keep the skill standalone-first and treat other skills as optional accelerators. Default cognitive_features to compact/interrogate; use insight, analyst, all, or off when requested or configured. For tests, demos, previews, or requests to show cognitive features, enable all visible cognitive features. Keep every inference visibly separate from reported facts, and write continuity to explicit user-visible artifacts when requested instead of hidden memory. State inferred assumptions when the request is underspecified."
