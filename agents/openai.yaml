interface:
  display_name: "More News Briefing"
  version: "0.1.5"
  short_description: "Evidence-first news briefs with optional insight layers"
  default_prompt: "Use $more-news-briefing in full mode. Resolve the briefing contract before retrieval, using the compact first-use gate when needed. Then collect, deduplicate, rank, verify, render, review, and polish a source-backed digest across default or user-defined topics. Keep the skill standalone-first and treat other skills as optional accelerators. Default cognitive_features to interrogate; enable sprout, commentary, or continuity only when requested or configured, and keep every inference visibly separate from reported facts. State inferred assumptions when the request is underspecified."
