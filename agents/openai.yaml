interface:
  display_name: "More News Briefing"
  version: "0.1.2"
  short_description: "Standalone-first multi-topic news digest"
  default_prompt: "Use $more-news-briefing in full mode by default. Treat this skill as standalone-first: resolve the briefing contract first, and if this is the user's first use or the specialty topic is vague, guide them to choose their themes and define the specialty topic with scope, keywords, geography, and priority lens before retrieval. Then collect, rank, verify, summarize, and prepare a source-backed news digest across AI, politics, culture, sports, finance, and custom topics using this skill's built-in workflow. Only use other skills as optional accelerators. State inferred assumptions when the request is underspecified."
