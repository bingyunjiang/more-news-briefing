interface:
  display_name: "More News Briefing"
  version: "0.1.4"
  short_description: "Standalone-first multi-topic news digest"
  default_prompt: "Use $more-news-briefing in full mode by default. Treat this skill as standalone-first: resolve the briefing contract first. If this is the user's first use, do not silently skip customization even when the user invokes the skill directly with a short request. Start with a compact gate that offers three paths: direct default run, quick customization, or deep customization. In quick customization, prioritize topic mix, specialty direction, geography, and priority lens. In deep customization, also resolve source style and recurring watchlists. If the user still wants immediate output, run once with defaults but explicitly label the assumptions as a default first-use run and remind them that quick customization is available next time. Then collect, rank, verify, summarize, and prepare a source-backed news digest across AI, politics, culture, sports, finance, and custom topics using this skill's built-in workflow. Only use other skills as optional accelerators. State inferred assumptions when the request is underspecified."
